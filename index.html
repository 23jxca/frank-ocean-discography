<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Frank Ocean Discography</title>
    <link rel="icon" type="image/x-icon" href="icon.jpeg">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Frank Ocean</h1>
</header>

<main>
    <div class="albums" id="albumsContainer"></div>
</main>

<script>
    function togglePlay(btn) {
        const audio = btn.closest('.player').querySelector('audio');
        const allAudios = document.querySelectorAll('audio');
        allAudios.forEach(a => {
            if (a !== audio) {
                a.pause();
                const otherBtn = a.closest('.player').querySelector('.play-btn');
                if (otherBtn) otherBtn.innerHTML = '&#9654;';
            }
        });
        if (audio.paused) {
            audio.play();
            btn.innerHTML = '&#10074;&#10074;';
        } else {
            audio.pause();
            btn.innerHTML = '&#9654;';
        }
        audio.ontimeupdate = () => {
            const bar = btn.closest('.player').querySelector('.progress-bar');
            const time = btn.closest('.player').querySelector('.time');
            const pct = audio.duration ? (audio.currentTime / audio.duration) * 100 : 0;
            bar.style.width = pct + '%';
            time.textContent = fmt(audio.currentTime) + ' / ' + fmt(audio.duration || 0);
        };
        audio.onended = () => {
            btn.innerHTML = '&#9654;';
        };
    }

    function seek(wrap, e) {
        const audio = wrap.closest('.player').querySelector('audio');
        const rect = wrap.getBoundingClientRect();
        const pct = (e.clientX - rect.left) / rect.width;
        if (audio.duration) audio.currentTime = pct * audio.duration;
    }

    function fmt(s) {
        s = Math.floor(s);
        return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
    }

    async function loadAlbums() {
        const response = await fetch('data.json');
        const albumsData = await response.json();
        const container = document.getElementById('albumsContainer');

        albumsData.forEach((album, index) => {
            const albumDiv = document.createElement('div');
            albumDiv.className = `album album-${album.id}`;
            albumDiv.dataset.index = index;

            const scrollDiv = document.createElement('div');
            scrollDiv.className = 'scroll-content';

            const coverDiv = document.createElement('div');
            coverDiv.className = 'cover';
            coverDiv.innerHTML = `
                <img src="${album.cover}" alt="${album.title}">
                <h2>${album.title}</h2>
            `;
            scrollDiv.appendChild(coverDiv);

            const tracksDiv = document.createElement('div');
            tracksDiv.className = 'tracks';
            album.tracks.forEach(track => {
                const trackDiv = document.createElement('div');
                trackDiv.className = 'track';
                trackDiv.innerHTML = `
                    <a href="${track.file}">${track.num}. ${track.title}</a>
                    <div class="player">
                        <audio src="${track.file}" preload="none"></audio>
                        <button class="play-btn" onclick="togglePlay(this)">&#9654;</button>
                        <div class="progress-wrap" onclick="seek(this, event)">
                            <div class="progress-bar"></div>
                        </div>
                        <span class="time">0:00 / 0:00</span>
                    </div>
                `;
                tracksDiv.appendChild(trackDiv);
            });
            scrollDiv.appendChild(tracksDiv);

            albumDiv.appendChild(scrollDiv);
            container.appendChild(albumDiv);
        });

        initAlbumEvents();
    }

    function initAlbumEvents() {
        const albums = document.querySelectorAll('.album');
        let activeAlbum = null;

        function resetFan() {
            albums.forEach(a => {
                a.classList.remove('collapsed', 'active', 'open');
                a.style.position = 'absolute';
                a.style.top = '';
                a.style.left = '';
                a.style.transform = '';
                a.style.width = '';
                a.style.height = '';
                a.style.maxHeight = '';
                a.style.overflow = '';
                a.style.padding = '';
                a.style.opacity = '';
                a.style.pointerEvents = '';
                a.style.zIndex = '';
                a.style.boxShadow = '';
            });
            activeAlbum = null;
        }

        albums.forEach((album) => {
            album.addEventListener('click', function(e) {
                if (e.target.closest('.player') || e.target.closest('a')) return;

                if (activeAlbum === this) {
                    resetFan();
                    return;
                }

                if (activeAlbum) {
                    activeAlbum.classList.remove('active', 'open');
                    albums.forEach(a => a.classList.remove('collapsed'));
                }

                this.classList.add('active', 'open');
                activeAlbum = this;

                albums.forEach(a => {
                    if (a !== this) a.classList.add('collapsed');
                });
            });

            album.addEventListener('mouseenter', function() {
                if (!this.classList.contains('active') && !this.classList.contains('collapsed')) {
                    this.style.transform = 'translateY(-30px) scale(1.05)';
                    this.style.zIndex = '10';
                }
            });
            album.addEventListener('mouseleave', function() {
                if (!this.classList.contains('active') && !this.classList.contains('collapsed')) {
                    this.style.transform = '';
                    this.style.zIndex = '';
                }
            });
        });

        document.addEventListener('click', function(e) {
            if (activeAlbum && !e.target.closest('.album')) {
                resetFan();
            }
        });

        document.querySelectorAll('.player, .track a').forEach(el => {
            el.addEventListener('click', function(e) {
                e.stopPropagation();
            });
        });
    }

    loadAlbums();
</script>

</body>
</html>
